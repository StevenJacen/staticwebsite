<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心忆科技 - AI 养老陪伴官网</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#111827',
              muted: '#667085',
              dark: '#08111f',
              panel: '#102033',
              cyan: '#14b8c8',
              purple: '#5b5bd6',
              warm: '#d99b45',
              signal: '#d94a38',
              sage: '#e7efe9',
              sky: '#edf7fb',
              clay: '#fff1e7',
              paper: '#f8f4ed',
              soft: '#fbfaf7',
              mist: '#eef7f8',
            },
            fontFamily: {
              sans: ['Segoe UI', 'Microsoft YaHei', 'Arial', 'sans-serif'],
              handwriting: ['Segoe UI', 'Microsoft YaHei', 'Arial', 'sans-serif'],
            },
            backgroundImage: {
              'gradient-multi-color': 'linear-gradient(to right, #d94a38, #d99b45, #14b8c8, #5b5bd6)',
            },
            animation: {
              blob: "blob 7s infinite",
              'gradient-x': 'gradient-x 6s ease infinite',
            },
            keyframes: {
              'gradient-x': {
                '0%, 100%': {
                    'background-size': '200% 200%',
                    'background-position': 'left center'
                },
                '50%': {
                    'background-size': '200% 200%',
                    'background-position': 'right center'
                },
              },
              blob: {
                "0%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
                "33%": {
                  transform: "translate(30px, -50px) scale(1.1)",
                },
                "66%": {
                  transform: "translate(-20px, 20px) scale(0.9)",
                },
                "100%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
              },
            },
          },
        },
      }
    </script>
    <style>
      :root {
        --ink: #111827;
        --muted: #667085;
        --dark: #08111f;
        --panel: #102033;
        --cyan: #14b8c8;
        --purple: #5b5bd6;
        --warm: #d99b45;
        --signal: #d94a38;
        --sage: #e7efe9;
        --sky: #edf7fb;
        --clay: #fff1e7;
        --paper: #f8f4ed;
        --soft: #fbfaf7;
        --mist: #eef7f8;
        --line: rgba(17, 24, 39, 0.1);
        --radius: 8px;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        color: var(--ink);
        background: var(--soft);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--paper);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(16, 32, 51, 0.28);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--signal);
      }
      .hm-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--panel);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .hm-eyebrow::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--signal);
      }
      .hm-section {
        padding: clamp(64px, 8vw, 112px) clamp(20px, 6vw, 88px);
      }
      .hm-title {
        color: #0b1726;
        line-height: 1.12;
        letter-spacing: 0;
      }
      .hm-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
      }
      .hm-primary {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: var(--signal);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 14px 32px rgba(217, 74, 56, 0.22);
      }
      .hm-secondary {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        border: 1px solid rgba(17, 24, 39, 0.18);
        color: var(--ink);
        font-weight: 700;
      }
      .bg-slate-50 {
        background-color: var(--paper) !important;
      }
      .bg-blue-50 {
        background-color: var(--sky) !important;
      }
      .bg-slate-950,
      .bg-slate-900 {
        background-color: var(--panel) !important;
      }
      .bg-blue-600 {
        background-color: var(--signal) !important;
      }
      .hover\:bg-blue-700:hover {
        background-color: #bd3f31 !important;
      }
      .text-slate-950,
      .text-slate-900 {
        color: var(--ink) !important;
      }
      .text-slate-600,
      .text-slate-500,
      .text-slate-400 {
        color: var(--muted) !important;
      }
      .text-blue-700,
      .text-blue-600 {
        color: var(--signal) !important;
      }
      .text-blue-500,
      .text-emerald-600,
      .text-emerald-700 {
        color: var(--cyan) !important;
      }
      .border-slate-100,
      .ring-slate-100 {
        border-color: var(--line) !important;
      }
      .rounded-2xl,
      .rounded-\[2rem\] {
        border-radius: var(--radius) !important;
      }
      .hm-section-heading {
        max-width: 820px;
        margin-bottom: 34px;
      }
      .hm-section-heading p:not(.hm-eyebrow) {
        max-width: 760px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.72;
      }
      .hm-definition-section,
      .hm-product-proof-section,
      .hm-family-section {
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 46px;
        align-items: center;
      }
      .hm-compare-list {
        display: grid;
        gap: 12px;
      }
      .hm-compare-list div {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
      }
      .hm-compare-list span {
        color: var(--signal);
        font-weight: 900;
      }
      .hm-compare-list div:last-child {
        color: #fff;
        background:
          radial-gradient(circle at 92% 18%, rgba(217, 74, 56, 0.2), transparent 28%),
          linear-gradient(135deg, #102033, #17334a);
        border-color: transparent;
      }
      .hm-compare-list div:last-child span {
        color: var(--warm);
      }
      .hm-capability-section {
        background: var(--sky);
      }
      .hm-capability-grid,
      .hm-trust-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }
      .hm-capability-grid article,
      .hm-trust-grid article,
      .hm-faq-list details {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
      }
      .hm-capability-grid article,
      .hm-trust-grid article {
        min-height: 210px;
        padding: 26px;
      }
      .hm-product-proof-section {
        background: var(--sage);
      }
      .hm-proof-image img {
        display: block;
        width: 100%;
        border-radius: var(--radius);
        border: 1px solid rgba(17, 24, 39, 0.1);
        box-shadow: 0 22px 70px rgba(61, 45, 28, 0.14);
      }
      .hm-proof-points {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }
      .hm-proof-points span {
        padding: 10px 12px;
        border-radius: 6px;
        color: #0d1b2a;
        background: #fff;
        border: 1px solid rgba(17, 24, 39, 0.1);
        font-weight: 800;
      }
      .hm-timeline {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .hm-time-card {
        min-height: 112px;
        padding: 18px;
        text-align: left;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        cursor: pointer;
      }
      .hm-time-card span {
        display: block;
        margin-bottom: 12px;
        color: var(--purple);
        font-weight: 800;
      }
      .hm-time-card-active {
        color: #fff;
        background: var(--panel);
        border-color: var(--panel);
      }
      .hm-time-card-active span {
        color: var(--cyan);
      }
      .hm-scene-preview {
        margin-top: 18px;
        padding: 28px;
        border-radius: var(--radius);
        color: #fff;
        background: linear-gradient(135deg, #102033, #17334a);
      }
      .hm-scene-preview span {
        color: var(--cyan);
        font-weight: 800;
      }
      .hm-scene-preview p {
        margin: 8px 0 0;
        font-size: clamp(24px, 4vw, 44px);
        font-weight: 800;
        line-height: 1.18;
      }
      .hm-family-section {
        color: #fff;
        background:
          radial-gradient(circle at 86% 24%, rgba(20, 184, 200, 0.16), transparent 26%),
          linear-gradient(135deg, #102033, #17334a);
      }
      .hm-family-section p {
        color: rgba(255, 255, 255, 0.72);
      }
      .hm-family-points {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .hm-family-points span {
        min-height: 90px;
        padding: 20px;
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        font-weight: 800;
      }
      .hm-trust-section {
        background: var(--mist);
      }
      .hm-trust-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .hm-faq-section {
        background: var(--paper);
      }
      .hm-faq-list {
        display: grid;
        gap: 12px;
      }
      .hm-faq-list details {
        padding: 20px 24px;
      }
      .hm-faq-list summary {
        cursor: pointer;
        font-weight: 800;
      }
      .hm-faq-list p {
        color: var(--muted);
        line-height: 1.72;
      }
      @media (max-width: 960px) {
        .hm-definition-section,
        .hm-product-proof-section,
        .hm-family-section {
          grid-template-columns: 1fr;
        }
        .hm-capability-grid,
        .hm-trust-grid,
        .hm-timeline,
        .hm-family-points {
          grid-template-columns: 1fr;
        }
        .hm-compare-list div {
          display: grid;
        }
      }
      .hm-marquee {
        overflow: hidden;
        mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
      }
      .hm-marquee-track {
        animation: hm-marquee 34s linear infinite;
        width: max-content;
      }
      .hm-marquee:hover .hm-marquee-track {
        animation-play-state: paused;
      }
      @keyframes hm-marquee {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
