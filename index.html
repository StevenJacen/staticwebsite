<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心忆科技-居家陪伴机器人专家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#111827',
              muted: '#667085',
              dark: '#08111f',
              panel: '#102033',
              cyan: '#14b8c8',
              purple: '#5b5bd6',
              warm: '#d99b45',
              signal: '#d94a38',
              sage: '#e7efe9',
              sky: '#edf7fb',
              clay: '#fff1e7',
              paper: '#f8f4ed',
              soft: '#fbfaf7',
              mist: '#eef7f8',
            },
            fontFamily: {
              sans: ['Noto Sans SC', 'Source Han Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', 'Arial', 'sans-serif'],
              handwriting: ['Noto Sans SC', 'Source Han Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', 'Arial', 'sans-serif'],
            },
            backgroundImage: {
              'gradient-multi-color': 'linear-gradient(to right, #d94a38, #d99b45, #14b8c8, #5b5bd6)',
            },
            animation: {
              blob: "blob 7s infinite",
              'gradient-x': 'gradient-x 6s ease infinite',
            },
            keyframes: {
              'gradient-x': {
                '0%, 100%': {
                    'background-size': '200% 200%',
                    'background-position': 'left center'
                },
                '50%': {
                    'background-size': '200% 200%',
                    'background-position': 'right center'
                },
              },
              blob: {
                "0%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
                "33%": {
                  transform: "translate(30px, -50px) scale(1.1)",
                },
                "66%": {
                  transform: "translate(-20px, 20px) scale(0.9)",
                },
                "100%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
              },
            },
          },
        },
      }
    </script>
    <style>
      :root {
        --ink: #111827;
        --muted: #667085;
        --dark: #08111f;
        --panel: #102033;
        --cyan: #14b8c8;
        --purple: #5b5bd6;
        --warm: #d99b45;
        --signal: #d94a38;
        --sage: #e7efe9;
        --sky: #edf7fb;
        --clay: #fff1e7;
        --paper: #f8f4ed;
        --soft: #fbfaf7;
        --mist: #eef7f8;
        --line: rgba(17, 24, 39, 0.1);
        --radius: 8px;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: var(--soft);
        font-size: 16px;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      h1,
      h2,
      h3,
      strong {
        font-weight: 750;
      }
      .font-black {
        font-weight: 750 !important;
      }
      .font-extrabold {
        font-weight: 720 !important;
      }
      .font-bold {
        font-weight: 680 !important;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--paper);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(16, 32, 51, 0.28);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--signal);
      }
      .hm-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--panel);
        font-size: 12px;
        font-weight: 720;
        letter-spacing: 0;
      }
      .hm-eyebrow::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--signal);
      }
      .hm-section {
        padding: clamp(56px, 7vw, 96px) clamp(20px, 6vw, 88px);
      }
      .hm-title {
        color: #0b1726;
        line-height: 1.16;
        letter-spacing: 0;
        font-weight: 750;
      }
      .hm-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
      }
      .hm-page-hero {
        position: relative;
        display: grid;
        min-height: 520px;
        align-items: center;
        overflow: hidden;
        padding: clamp(64px, 7vw, 88px) clamp(20px, 6vw, 88px);
        color: #fff;
        background:
          radial-gradient(circle at 86% 20%, rgba(20, 184, 200, 0.14), transparent 28%),
          linear-gradient(135deg, #102033, #17334a);
      }
      .hm-page-hero-inner {
        position: relative;
        z-index: 1;
        display: grid;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.72fr);
        gap: clamp(28px, 4vw, 52px);
        align-items: center;
      }
      .hm-page-hero-copy {
        max-width: 760px;
      }
      .hm-page-kicker {
        color: var(--warm);
        font-size: 12px;
        font-weight: 720;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .hm-page-title {
        margin-top: 18px;
        max-width: 820px;
        font-size: clamp(34px, 4.2vw, 54px);
        font-weight: 750;
        line-height: 1.15;
        letter-spacing: 0;
      }
      .hm-page-lead {
        max-width: 720px;
        margin-top: 22px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 17px;
        line-height: 1.8;
      }
      .hm-page-visual,
      .hm-page-card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 22px 70px rgba(8, 17, 31, 0.18);
      }
      .hm-page-visual {
        min-height: 260px;
        max-height: 300px;
        overflow: hidden;
      }
      .hm-page-visual img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 260px;
        object-fit: cover;
      }
      .hm-page-card {
        width: min(100%, 360px);
        justify-self: end;
        padding: 24px;
        color: var(--ink);
        background: #fff;
      }
      .hm-primary {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: var(--signal);
        color: #fff;
        font-weight: 680;
        box-shadow: 0 14px 32px rgba(217, 74, 56, 0.22);
      }
      .hm-secondary {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        border: 1px solid rgba(17, 24, 39, 0.18);
        color: var(--ink);
        font-weight: 680;
      }
      .bg-slate-50 {
        background-color: var(--paper) !important;
      }
      .bg-blue-50 {
        background-color: var(--sky) !important;
      }
      .bg-slate-950,
      .bg-slate-900 {
        background-color: var(--panel) !important;
      }
      .bg-blue-600 {
        background-color: var(--signal) !important;
      }
      .hover\:bg-blue-700:hover {
        background-color: #bd3f31 !important;
      }
      .text-slate-950,
      .text-slate-900 {
        color: var(--ink) !important;
      }
      .text-slate-600,
      .text-slate-500,
      .text-slate-400 {
        color: var(--muted) !important;
      }
      .text-blue-700,
      .text-blue-600 {
        color: var(--signal) !important;
      }
      .text-blue-500,
      .text-emerald-600,
      .text-emerald-700 {
        color: var(--cyan) !important;
      }
      .border-slate-100,
      .ring-slate-100 {
        border-color: var(--line) !important;
      }
      .rounded-2xl,
      .rounded-\[2rem\] {
        border-radius: var(--radius) !important;
      }
      .hm-section-heading {
        max-width: 780px;
        margin-bottom: 30px;
      }
      .hm-section-heading p:not(.hm-eyebrow) {
        max-width: 720px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.72;
      }
      .hm-definition-section,
      .hm-product-proof-section,
      .hm-family-section {
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 46px;
        align-items: center;
      }
      .hm-compare-list {
        display: grid;
        gap: 12px;
      }
      .hm-compare-list div {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        transition: color 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }
      .hm-compare-list span {
        color: var(--signal);
        font-weight: 750;
        transition: color 180ms ease;
      }
      .hm-compare-list div:hover {
        color: #fff;
        background:
          radial-gradient(circle at 92% 18%, rgba(217, 74, 56, 0.2), transparent 28%),
          linear-gradient(135deg, #102033, #17334a);
        border-color: transparent;
        box-shadow: 0 18px 42px rgba(16, 32, 51, 0.16);
        transform: translateY(-2px);
      }
      .hm-compare-list div:hover span {
        color: var(--warm);
      }
      .hm-capability-section {
        background: var(--sky);
      }
      .hm-capability-grid,
      .hm-trust-grid {
        display: grid;
        gap: 18px;
      }
      .hm-capability-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .hm-trust-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .hm-capability-grid article,
      .hm-trust-grid article,
      .hm-faq-list details {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
      }
      .hm-capability-grid article,
      .hm-trust-grid article {
        min-height: 210px;
        padding: 26px;
      }
      .hm-capability-grid article p:first-of-type {
        margin-bottom: 8px;
      }
      .hm-product-proof-section {
        background: var(--sage);
      }
      .hm-proof-image img {
        display: block;
        width: 100%;
        border-radius: var(--radius);
        border: 1px solid rgba(17, 24, 39, 0.1);
        box-shadow: 0 22px 70px rgba(61, 45, 28, 0.14);
      }
      .hm-proof-points {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }
      .hm-proof-points span {
        padding: 10px 12px;
        border-radius: 6px;
        color: #0d1b2a;
        background: #fff;
        border: 1px solid rgba(17, 24, 39, 0.1);
        font-weight: 720;
      }
      .hm-timeline {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .hm-time-card {
        min-height: 112px;
        padding: 18px;
        text-align: left;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        cursor: pointer;
      }
      .hm-time-card span {
        display: block;
        margin-bottom: 12px;
        color: var(--purple);
        font-weight: 720;
      }
      .hm-time-card-active {
        color: #fff;
        background: var(--panel);
        border-color: var(--panel);
      }
      .hm-time-card-active span {
        color: var(--cyan);
      }
      .hm-scene-preview {
        margin-top: 18px;
        padding: 28px;
        border-radius: var(--radius);
        color: #fff;
        background: linear-gradient(135deg, #102033, #17334a);
      }
      .hm-scene-preview span {
        color: var(--cyan);
        font-weight: 800;
      }
      .hm-scene-preview p {
        margin: 8px 0 0;
        font-size: clamp(23px, 3.4vw, 38px);
        font-weight: 720;
        line-height: 1.24;
      }
      .hm-family-section {
        color: var(--ink);
        background: var(--clay);
      }
      .hm-family-section p {
        color: var(--muted);
      }
      .hm-family-points {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .hm-family-points span {
        min-height: 90px;
        padding: 20px;
        border-radius: var(--radius);
        border: 1px solid rgba(217, 74, 56, 0.18);
        background: rgba(255, 255, 255, 0.72);
        font-weight: 720;
      }
      .hm-pricing-section {
        background: var(--soft);
      }
      .hm-pricing-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.9fr);
        gap: 18px;
        align-items: stretch;
      }
      .hm-pricing-image {
        min-height: 560px;
        overflow: hidden;
        border-radius: var(--radius);
        background: var(--paper);
      }
      .hm-pricing-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hm-price-card {
        position: relative;
        display: flex;
        min-height: 430px;
        flex-direction: column;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        padding: clamp(24px, 4vw, 34px);
        box-shadow: 0 18px 55px rgba(33, 28, 23, 0.06);
      }
      .hm-price-card-highlighted {
        color: var(--ink);
        border-color: #f2c9aa;
        background: var(--clay);
      }
      .hm-price-card h3 {
        font-size: 26px;
        line-height: 1.2;
      }
      .hm-price-card p {
        color: var(--muted);
        line-height: 1.72;
      }
      .hm-price-card-highlighted p {
        color: var(--muted);
      }
      .hm-price-tag {
        display: inline-flex;
        width: fit-content;
        margin-bottom: 16px;
        border-radius: 999px;
        background: rgba(217, 155, 69, 0.16);
        padding: 7px 10px;
        color: var(--warm);
        font-size: 12px;
        font-weight: 720;
      }
      .hm-price {
        margin-top: 18px;
        color: var(--signal);
        font-size: clamp(42px, 5vw, 60px);
        font-weight: 750;
        line-height: 1;
      }
      .hm-price span {
        margin-left: 4px;
        font-size: 18px;
        font-weight: 680;
      }
      .hm-price-card-highlighted .hm-price {
        color: var(--signal);
      }
      .hm-price-qr {
        display: inline-flex;
        width: fit-content;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
        border-radius: var(--radius);
        border: 1px solid rgba(17, 24, 39, 0.1);
        background: #fff;
        padding: 12px;
        box-shadow: 0 14px 36px rgba(33, 28, 23, 0.08);
      }
      .hm-price-qr img {
        display: block;
        width: clamp(136px, 13vw, 168px);
        aspect-ratio: 1;
        border-radius: 6px;
        object-fit: cover;
      }
      .hm-price-qr p {
        margin: 0;
        color: var(--panel);
        font-size: 13px;
        font-weight: 720;
        line-height: 1.4;
      }
      .hm-price-card ul {
        display: grid;
        gap: 12px;
        margin: 26px 0 0;
        padding: 0;
        list-style: none;
      }
      .hm-price-card li {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #334155;
        font-size: 14px;
        line-height: 1.6;
      }
      .hm-price-card-highlighted li {
        color: #334155;
      }
      .hm-price-card li::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--cyan);
      }
      .hm-price-card a {
        margin-top: auto;
        justify-self: flex-end;
      }
      .hm-trust-section {
        background: var(--mist);
      }
      .hm-trust-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .hm-faq-section {
        background: var(--paper);
      }
      .hm-faq-list {
        display: grid;
        gap: 12px;
      }
      .hm-faq-list details {
        padding: 20px 24px;
      }
      .hm-faq-list summary {
        cursor: pointer;
        font-weight: 720;
      }
      .hm-faq-list p {
        color: var(--muted);
        line-height: 1.72;
      }
      .hm-disclaimer {
        padding: 24px clamp(20px, 6vw, 88px);
        color: var(--muted);
        background: #fff8f3;
        border-top: 1px solid rgba(217, 74, 56, 0.12);
        font-size: 14px;
        line-height: 1.8;
        text-align: center;
      }
      @media (max-width: 960px) {
        .hm-page-hero {
          min-height: 360px;
          padding: 52px 20px;
        }
        .hm-page-hero-inner {
          grid-template-columns: 1fr;
          gap: 0;
        }
        .hm-page-hero-copy {
          max-width: 720px;
        }
        .hm-page-title {
          font-size: clamp(30px, 8vw, 38px);
          line-height: 1.18;
        }
        .hm-page-lead {
          font-size: 16px;
          line-height: 1.72;
        }
        .hm-page-visual,
        .hm-page-card {
          display: none;
        }
        .hm-definition-section,
        .hm-product-proof-section,
        .hm-family-section {
          grid-template-columns: 1fr;
        }
        .hm-capability-grid,
        .hm-pricing-grid,
        .hm-trust-grid,
        .hm-timeline,
        .hm-family-points {
          grid-template-columns: 1fr;
        }
        .hm-pricing-image {
          min-height: 360px;
        }
        .hm-compare-list div {
          display: grid;
        }
      }
      @media (max-width: 1180px) and (min-width: 961px) {
        .hm-capability-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      @media (min-width: 768px) {
        .md\:text-6xl {
          font-size: 3.35rem !important;
          line-height: 1.14 !important;
        }
        .md\:text-5xl {
          font-size: 2.7rem !important;
          line-height: 1.18 !important;
        }
        .md\:text-4xl {
          font-size: 2.15rem !important;
          line-height: 1.22 !important;
        }
      }
      @media (max-width: 640px) {
        .hm-section {
          padding: 52px 20px;
        }
      }
      .hm-marquee {
        overflow: hidden;
        mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
      }
      .hm-marquee-track {
        animation: hm-marquee 34s linear infinite;
        width: max-content;
      }
      .hm-marquee:hover .hm-marquee-track {
        animation-play-state: paused;
      }
      @keyframes hm-marquee {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
